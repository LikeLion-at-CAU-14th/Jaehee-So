<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멋사 회원가입</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="./logo.svg" alt="멋사로고">
            <h2 class="title">회원 가입을 위해 정보를 입력해주세요</h2>
        </div>
        <main class="info">
            <div class="list">
                <section class="info-item">
                    <p>* 이메일</p>
                    <input type="email" class="input-line"> 
                </section>
                <section class="info-item">
                    <p>* 이름</p>
                    <input type="text" class="input-line"> 
                </section>
                <section class="info-item">
                    <p>* 비밀번호</p>
                    <input type="password" class="input-line"> 
                </section>
                <section class="info-item">
                    <p>* 비밀번호 확인</p>
                    <input type="password" class="input-line"> 
                </section>
            </div>
            <section class="gender">
                <div class="radio-group">
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">여성</label>
                </div>
                <div class="radio-group">
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">남성</label>
                </div>
            </section>
            <section class="agree">
                <input type="checkbox" id="opt-in">
                <label for="opt-in">이용약관 개인정보 수집 및 이용, 마케팅 활용 선택에 모두 동의합니다.</label>
            </section>
            <div class="line"></div>
            <div class="submit-bt">
                <input type="button" value="가입하기">
            </div>

        </main>

    </div>
    
</body>
</html>
